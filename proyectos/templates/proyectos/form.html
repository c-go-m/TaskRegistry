<div class="form-container">
    <h2>{% if proyecto %}Editar Proyecto{% else %}Nuevo Proyecto{% endif %}</h2>

    <form class="form-proyecto"
          {% if proyecto %}
          hx-put="/proyectos/{{ proyecto.id }}"
          hx-target="#main-content"
          hx-swap="innerHTML"
          {% else %}
          hx-post="/proyectos/"
          hx-target="#main-content"
          hx-swap="innerHTML"
          {% endif %}>

        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text"
                   id="nombre"
                   name="nombre"
                   value="{{ proyecto.nombre if proyecto else '' }}"
                   required
                   maxlength="200"
                   placeholder="Nombre del proyecto">
        </div>

        <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion"
                      name="descripcion"
                      maxlength="2000"
                      placeholder="Descripción opcional del proyecto">{{ proyecto.descripcion if proyecto else '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                {% if proyecto %}Actualizar{% else %}Crear{% endif %}
            </button>
            <a href="/proyectos/"
               class="btn btn-secondary"
               hx-get="/proyectos/"
               hx-target="#main-content"
               hx-swap="innerHTML">
                Cancelar
            </a>
        </div>
    </form>
</div>
